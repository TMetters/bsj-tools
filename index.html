<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSJ Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0d2240;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header p {
      margin-top: 0.5rem;
      color: #7fa8d4;
      font-size: 0.95rem;
    }

    .tools {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .tool-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-align: center;
      text-decoration: none;
      color: #ffffff;
      width: 220px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .tool-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-3px);
    }

    .tool-card .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .tool-card .label {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
    }

    footer {
      margin-top: 4rem;
      color: #4a6a8a;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>BSJ Tools</h1>
    <p>Internal tools dashboard</p>
  </header>

  <main class="tools">
    <a class="tool-card" href="BSJ_IA_Batch_Tracker.html">
      <div class="icon">📋</div>
      <div class="label">IA Batch Tracker</div>
    </a>
    <a class="tool-card" href="TMetters_Command_Centre.html">
      <div class="icon">🎛️</div>
      <div class="label">Command Centre</div>
    </a>
    <a class="tool-card" href="BSJ_Investment_Onboarding.html">
      <div class="icon">📝</div>
      <div class="label">Investment Onboarding</div>
    </a>
  </main>

  <footer>&copy; 2026 BSJ</footer>
</body>
</html>
